<!doctype html>
<html lang="en">

<head>
	<link rel="preconnect" href="https://fonts.googleapis.com" />
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
	<link rel="stylesheet" media="print" onload="this.media='all'"
		href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&family=Nunito:wght@400;600;700;800&display=swap" />
	<noscript>
		<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&family=Nunito:wght@400;600;700;800&display=swap" />
	</noscript>
	<script>
		// Suppress SvelteKit router warning about history.pushState / history.replaceState conflict
		// triggered by third-party tracking scripts like Google Analytics (gtag.js)
		(function () {
			const originalWarn = console.warn;
			console.warn = function (...args) {
				if (args[0] && typeof args[0] === 'string' && args[0].includes('history.pushState') && args[0].includes('history.replaceState')) {
					return;
				}
				originalWarn.apply(console, args);
			};
		})();
	</script>
	<!-- Google tag (gtag.js) — deferred to avoid blocking first paint -->
	<script>
		window.dataLayer = window.dataLayer || [];
		function gtag() { dataLayer.push(arguments); }
		gtag('js', new Date());
		gtag('config', 'G-34LBR99BLW');
		window.addEventListener('load', function () {
			setTimeout(function () {
				var s = document.createElement('script');
				s.async = true;
				s.src = 'https://www.googletagmanager.com/gtag/js?id=G-34LBR99BLW';
				document.body.appendChild(s);
			}, 1500);
		});
	</script>



	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
	<meta name="theme-color" content="#0b0b0f" />
	<link rel="icon" type="image/svg+xml" href="/favicon.svg?v=3" />
	<meta name="application-name" content="WatchAnimeX" />
	<meta name="mobile-web-app-capable" content="yes" />
	<meta name="apple-mobile-web-app-capable" content="yes" />
	<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
	<meta name="apple-mobile-web-app-title" content="WatchAnimeX" />
	<link rel="apple-touch-icon" sizes="512x512" href="/favicon-512.png?v=3" />
	<meta name="format-detection" content="telephone=no" />
	<link rel="manifest" href="/manifest.json?v=2" />
	<link rel="icon" type="image/x-icon" href="/favicon.ico?v=3" />
	<link rel="icon" type="image/png" sizes="192x192" href="/favicon-192.png?v=3" />
	<link rel="icon" type="image/png" sizes="512x512" href="/favicon-512.png?v=3" />
	%sveltekit.head%
</head>

<body data-sveltekit-preload-data="hover">
	<a href="#page-main" class="skip-link">Skip to content</a>
	<div class="app-root">%sveltekit.body%</div>
</body>

</html>
