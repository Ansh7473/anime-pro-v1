name: Build and Deploy Apps

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy-frontend:
    name: Deploy SvelteKit Frontend to Cloudflare
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build Frontend
        run: npm run build

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: 'sveltekit-frontend'
          command: deploy

  build-desktop:
    name: Build Desktop App (Windows)
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build Desktop App
        working-directory: desktop-app
        run: npm run build

      - name: Upload Desktop Installer Artifact
        uses: actions/upload-artifact@v4
        with:
          name: animepro-windows-installer
          path: desktop-app/dist/*.exe

  build-desktop-mac:
    name: Build Desktop App (macOS)
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build Desktop App
        working-directory: desktop-app
        run: npm run build:mac

      - name: Upload Mac Installer Artifact
        uses: actions/upload-artifact@v4
        with:
          name: animepro-mac-installer
          path: |
            desktop-app/dist/*.dmg
            desktop-app/dist/*.zip

  build-desktop-linux:
    name: Build Desktop App (Linux)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build Desktop App
        working-directory: desktop-app
        run: npm run build:linux

      - name: Upload Linux Installer Artifact
        uses: actions/upload-artifact@v4
        with:
          name: animepro-linux-installer
          path: |
            desktop-app/dist/*.AppImage
            desktop-app/dist/*.deb

  build-android:
    name: Build Android App (APK)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Setup Java JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Sync Capacitor
        working-directory: android-app
        run: npx cap sync android

      - name: Build Debug APK
        working-directory: android-app/android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload Android APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: animepro-android-apk
          path: android-app/android/app/build/outputs/apk/debug/app-debug.apk

  build-tv:
    name: Build Flutter TV App (APK)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: false

      - name: Install Dependencies
        working-directory: anime_pro_tv
        run: flutter pub get

      - name: Build TV APK
        working-directory: anime_pro_tv
        run: flutter build apk --debug

      - name: Upload TV APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: animepro-tv-apk
          path: anime_pro_tv/build/app/outputs/flutter-apk/app-debug.apk

  release:
    name: Create GitHub Release
    needs: [build-desktop, build-desktop-mac, build-desktop-linux, build-android, build-tv]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Download Desktop Artifact
        uses: actions/download-artifact@v4
        with:
          name: animepro-windows-installer
          path: desktop-build

      - name: Download Mac Artifact
        uses: actions/download-artifact@v4
        with:
          name: animepro-mac-installer
          path: mac-build

      - name: Download Linux Artifact
        uses: actions/download-artifact@v4
        with:
          name: animepro-linux-installer
          path: linux-build

      - name: Download Android Artifact
        uses: actions/download-artifact@v4
        with:
          name: animepro-android-apk
          path: android-build

      - name: Download TV Artifact
        uses: actions/download-artifact@v4
        with:
          name: animepro-tv-apk
          path: tv-build

      - name: Prepare Release Files
        run: |
          mkdir release-assets
          cp desktop-build/*.exe release-assets/ || true
          cp mac-build/*.dmg release-assets/ || true
          cp mac-build/*.zip release-assets/ || true
          cp linux-build/*.AppImage release-assets/ || true
          cp linux-build/*.deb release-assets/ || true
          cp android-build/*.apk release-assets/AnimePro-Android.apk || true
          cp tv-build/*.apk release-assets/AnimePro-TV.apk || true

      - name: Create or Update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "AnimePro Latest Builds"
          body: |
            ### Automated Pre-release Builds
            This release contains the latest automated builds compiled from the `main` branch.
            
            * **Windows Desktop**: `AnimePro-Setup-*.exe`
            * **macOS Desktop**: `AnimePro-Mac-*.dmg` / `*.zip`
            * **Linux Desktop**: `AnimePro-Linux-*.AppImage` / `*.deb`
            * **Android Mobile**: `AnimePro-Android.apk`
            * **Android TV**: `AnimePro-TV.apk`
          draft: false
          prerelease: true
          files: |
            release-assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
