name: Build and Deploy Apps

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy-frontend:
    name: Deploy SvelteKit Frontend to Cloudflare
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Run Svelte-Check
        run: npm run check

      - name: Build Frontend
        run: npm run build

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        continue-on-error: true
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: 'sveltekit-frontend'
          command: deploy

      - name: Submit IndexNow URLs
        if: success()
        run: |
          echo "Waiting for deploy propagation..."
          sleep 12

          # Fetch sitemap and extract <loc> URLs
          SITEMAP_URLS=$(curl -sf --retry 3 --retry-delay 5 https://watchanimez.me/sitemap.xml \
            | grep -oP '(?<=<loc>)[^<]+' | head -200)

          if [ -z "$SITEMAP_URLS" ]; then
            echo "Could not fetch sitemap, submitting static pages only"
            URLS='["https://watchanimez.me/","https://watchanimez.me/latest/","https://watchanimez.me/tv-series/","https://watchanimez.me/movies/","https://watchanimez.me/schedule/","https://watchanimez.me/search/","https://watchanimez.me/intel/","https://watchanimez.me/download/","https://watchanimez.me/donate/"]'
          else
            # Convert newline-separated to JSON array
            URLS=$(echo "$SITEMAP_URLS" | jq -R -s 'split("\n") | map(select(length > 0))')
          fi

          echo "Submitting URLs to IndexNow..."
          RESPONSE=$(curl -s -w "\nHTTP_STATUS:%{http_code}" -X POST \
            "https://watchanimez.me/api/indexnow" \
            -H "content-type: application/json" \
            -d "{\"urls\": $URLS}")

          HTTP_STATUS=$(echo "$RESPONSE" | grep -oP 'HTTP_STATUS:\K\d+')
          BODY=$(echo "$RESPONSE" | sed 's/HTTP_STATUS:.*//')

          echo "IndexNow response ($HTTP_STATUS): $BODY"
          if [ "$HTTP_STATUS" = "200" ] || [ "$HTTP_STATUS" = "429" ]; then
            echo "IndexNow submission successful (429 = already submitted recently)"
          else
            echo "IndexNow submission returned unexpected status $HTTP_STATUS"
          fi

  check-go:
    name: Check Go Backend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Install Dependencies
        working-directory: backend-go
        run: go mod download

      - name: Run Go Vet
        working-directory: backend-go
        run: go vet ./...

      - name: Run Go Tests
        working-directory: backend-go
        run: go test -v ./...
        continue-on-error: true

      - name: Check Go Compilation
        working-directory: backend-go
        run: go build -v -o /dev/null cmd/server/main.go

  build-desktop:
    name: Build Desktop App (Windows)
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build Desktop App
        working-directory: desktop-app
        run: npm run build

      - name: Upload Desktop Installer Artifact
        uses: actions/upload-artifact@v4
        with:
          name: watchanimez-windows-installer
          path: desktop-app/dist/*.exe

  build-desktop-mac:
    name: Build Desktop App (macOS)
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build Desktop App
        working-directory: desktop-app
        run: npm run build:mac

      - name: Upload Mac Installer Artifact
        uses: actions/upload-artifact@v4
        with:
          name: watchanimez-mac-installer
          path: |
            desktop-app/dist/*.dmg
            desktop-app/dist/*.zip

  build-desktop-linux:
    name: Build Desktop App (Linux)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y rpm libarchive-tools

      - name: Install Dependencies
        run: npm ci

      - name: Build Desktop App
        working-directory: desktop-app
        run: npm run build:linux

      - name: Upload Linux Installer Artifact
        uses: actions/upload-artifact@v4
        with:
          name: watchanimez-linux-installer
          path: |
            desktop-app/dist/*.AppImage
            desktop-app/dist/*.deb

  build-android:
    name: Build Android App (APK)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Setup Java JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Sync Capacitor
        working-directory: android-app
        run: npx cap sync android

      - name: Build Debug APK
        working-directory: android-app/android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload Android APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: watchanimez-android-apk
          path: android-app/android/app/build/outputs/apk/debug/app-debug.apk

  build-tv:
    name: Build Flutter TV App (APK)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: false

      - name: Install Dependencies
        working-directory: anime_pro_tv
        run: flutter pub get

      - name: Run Flutter Analyzer
        working-directory: anime_pro_tv
        run: flutter analyze
        continue-on-error: true

      - name: Build TV APK
        working-directory: anime_pro_tv
        run: flutter build apk --debug --android-skip-build-dependency-validation

      - name: Upload TV APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: watchanimez-tv-apk
          path: anime_pro_tv/build/app/outputs/flutter-apk/app-debug.apk

  release:
    name: Create GitHub Release
    needs: [build-desktop, build-desktop-mac, build-desktop-linux, build-android, build-tv, check-go, deploy-frontend]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download Desktop Artifact
        uses: actions/download-artifact@v4
        with:
          name: watchanimez-windows-installer
          path: desktop-build

      - name: Download Mac Artifact
        uses: actions/download-artifact@v4
        with:
          name: watchanimez-mac-installer
          path: mac-build

      - name: Download Linux Artifact
        uses: actions/download-artifact@v4
        with:
          name: watchanimez-linux-installer
          path: linux-build

      - name: Download Android Artifact
        uses: actions/download-artifact@v4
        with:
          name: watchanimez-android-apk
          path: android-build

      - name: Download TV Artifact
        uses: actions/download-artifact@v4
        with:
          name: watchanimez-tv-apk
          path: tv-build

      - name: Prepare Release Files
        run: |
          mkdir release-assets
          cp desktop-build/*.exe release-assets/ || true
          cp mac-build/*.dmg release-assets/ || true
          cp mac-build/*.zip release-assets/ || true
          cp linux-build/*.AppImage release-assets/ || true
          cp linux-build/*.deb release-assets/ || true
          cp android-build/*.apk release-assets/WatchAnimez-Android.apk || true
          cp tv-build/*.apk release-assets/WatchAnimez-TV.apk || true

      - name: Generate Release Body
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            if [ -f RELEASE_NOTES.md ]; then
              cat RELEASE_NOTES.md > release_body.txt
            else
              echo -e "### WatchAnimez ${{ github.ref_name }}\n\nProfessional release of WatchAnimez." > release_body.txt
            fi
          else
            echo -e "### Automated Pre-release Builds\nThis release contains the latest automated builds compiled from the \`main\` branch.\n\n* **Windows Desktop**: \`WatchAnimez-Setup-*.exe\`\n* **macOS Desktop**: \`WatchAnimez-Mac-*.dmg\` / \`*.zip\`\n* **Linux Desktop**: \`WatchAnimez-Linux-*.AppImage\` / \`*.deb\`\n* **Android Mobile**: \`WatchAnimez-Android.apk\`\n* **Android TV**: \`WatchAnimez-TV.apk\`" > release_body.txt
          fi
        shell: bash

      - name: Create or Update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || 'latest' }}
          name: ${{ startsWith(github.ref, 'refs/tags/v') && format('WatchAnimez {0}', github.ref_name) || 'WatchAnimez Latest Builds' }}
          body_path: release_body.txt
          draft: false
          prerelease: ${{ !startsWith(github.ref, 'refs/tags/v') }}
          files: |
            release-assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
