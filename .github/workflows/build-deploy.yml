name: Build and Deploy Apps

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  detect-changes:
    name: Detect Changed Paths
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      desktop: ${{ steps.filter.outputs.desktop }}
      flutter: ${{ steps.filter.outputs.flutter }}
      android-capacitor: ${{ steps.filter.outputs.android-capacitor }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            frontend:
              - 'sveltekit-frontend/**'
              - 'api-cache-worker/**'
            desktop:
              - 'desktop-app/**'
              - 'sveltekit-frontend/**'
              - 'api-cache-worker/**'
            flutter:
              - 'flutter/**'
            android-capacitor:
              - 'android-app/**'
  deploy-frontend:
    name: Deploy SvelteKit Frontend to Cloudflare
    needs: detect-changes
    if: needs.detect-changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Run Svelte-Check
        run: npm run check

      - name: Build Frontend
        run: npm run build

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        continue-on-error: true
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: 'sveltekit-frontend'
          command: deploy

      - name: Submit IndexNow URLs
        if: success()
        run: |
          LOG_FILE="indexnow-log.txt"
          TIMESTAMP=$(date -u '+%Y-%m-%dT%H:%M:%SZ')

          echo "====================================================" >> "$LOG_FILE"
          echo "IndexNow Submission Log" >> "$LOG_FILE"
          echo "====================================================" >> "$LOG_FILE"
          echo "Timestamp : $TIMESTAMP" >> "$LOG_FILE"
          echo "Commit    : ${{ github.sha }}" >> "$LOG_FILE"
          echo "Branch    : ${{ github.ref_name }}" >> "$LOG_FILE"
          echo "Run ID    : ${{ github.run_id }}" >> "$LOG_FILE"
          echo "----------------------------------------------------" >> "$LOG_FILE"
          echo "" >> "$LOG_FILE"

          echo "Waiting 12s for deploy propagation..."
          sleep 12

          # Fetch sitemap and extract <loc> URLs
          echo "[1/3] Fetching sitemap..." >> "$LOG_FILE"
          SITEMAP_URLS=$(curl -sf --retry 3 --retry-delay 5 https://watchanimez.me/sitemap.xml \
            | grep -oP '(?<=<loc>)[^<]+' | head -200)

          if [ -z "$SITEMAP_URLS" ]; then
            echo "  Could not fetch sitemap, using static fallback" >> "$LOG_FILE"
            URLS='["https://watchanimez.me/","https://watchanimez.me/latest/","https://watchanimez.me/tv-series/","https://watchanimez.me/movies/","https://watchanimez.me/schedule/","https://watchanimez.me/search/","https://watchanimez.me/intel/","https://watchanimez.me/download/","https://watchanimez.me/donate/"]'
            URL_COUNT=9
            echo "  Source   : fallback (static pages)" >> "$LOG_FILE"
          else
            URLS=$(echo "$SITEMAP_URLS" | jq -R -s 'split("\n") | map(select(length > 0))')
            URL_COUNT=$(echo "$SITEMAP_URLS" | wc -l)
            echo "  Source   : sitemap.xml" >> "$LOG_FILE"
          fi
          echo "  URLs     : $URL_COUNT" >> "$LOG_FILE"
          echo "" >> "$LOG_FILE"

          echo "[2/3] POSTing to /api/indexnow..." >> "$LOG_FILE"
          RESPONSE=$(curl -s -w "\nHTTP_STATUS:%{http_code}" -X POST \
            "https://watchanimez.me/api/indexnow" \
            -H "content-type: application/json" \
            -d "{\"urls\": $URLS}")

          HTTP_STATUS=$(echo "$RESPONSE" | grep -oP 'HTTP_STATUS:\K\d+')
          BODY=$(echo "$RESPONSE" | sed 's/HTTP_STATUS:.*//')

          echo "  Status   : $HTTP_STATUS" >> "$LOG_FILE"
          echo "  Response : $BODY" >> "$LOG_FILE"
          echo "" >> "$LOG_FILE"

          echo "[3/3] Result" >> "$LOG_FILE"
          if [ "$HTTP_STATUS" = "200" ]; then
            echo "  PASS — URLs submitted successfully" >> "$LOG_FILE"
          elif [ "$HTTP_STATUS" = "429" ]; then
            echo "  PASS — Already submitted recently (rate-limited)" >> "$LOG_FILE"
          else
            echo "  FAIL — Unexpected status $HTTP_STATUS" >> "$LOG_FILE"
          fi
          echo "" >> "$LOG_FILE"
          echo "====================================================" >> "$LOG_FILE"

          echo "IndexNow response ($HTTP_STATUS): $BODY"
          cat "$LOG_FILE"

      - name: Upload IndexNow Log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: indexnow-log
          path: indexnow-log.txt
          retention-days: 90

  build-desktop:
    name: Build Desktop App (Windows)
    needs: detect-changes
    if: needs.detect-changes.outputs.desktop == 'true'
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Cache Electron downloads
        uses: actions/cache@v4
        with:
          path: |
            ${{ runner.temp }}/electron-cache
            ${{ runner.temp }}/electron-builder-cache
          key: electron-windows-${{ hashFiles('desktop-app/package.json') }}
          restore-keys: |
            electron-windows-

      - name: Build Desktop App
        working-directory: desktop-app
        shell: pwsh
        env:
          ELECTRON_CACHE: ${{ runner.temp }}/electron-cache
          ELECTRON_BUILDER_CACHE: ${{ runner.temp }}/electron-builder-cache
        run: |
          $PSNativeCommandUseErrorActionPreference = $false
          for ($i = 1; $i -le 3; $i++) {
            Write-Host "Desktop build attempt $i of 3"
            npm run build
            if ($LASTEXITCODE -eq 0) { exit 0 }
            if ($i -lt 3) {
              Write-Host "Attempt $i failed (exit $LASTEXITCODE). Retrying in 20s..."
              Start-Sleep -Seconds 20
            }
          }
          Write-Error "Desktop build failed after 3 attempts"
          exit 1

      - name: Upload Desktop Installer Artifact
        uses: actions/upload-artifact@v4
        with:
          name: watchanimez-windows-installer
          path: desktop-app/dist/*.exe

  build-desktop-mac:
    name: Build Desktop App (macOS)
    needs: detect-changes
    if: needs.detect-changes.outputs.desktop == 'true'
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Cache Electron downloads
        uses: actions/cache@v4
        with:
          path: |
            ${{ runner.temp }}/electron-cache
            ${{ runner.temp }}/electron-builder-cache
          key: electron-mac-${{ hashFiles('desktop-app/package.json') }}
          restore-keys: |
            electron-mac-

      - name: Build Desktop App
        working-directory: desktop-app
        env:
          ELECTRON_CACHE: ${{ runner.temp }}/electron-cache
          ELECTRON_BUILDER_CACHE: ${{ runner.temp }}/electron-builder-cache
        run: |
          for i in 1 2 3; do
            echo "Desktop build attempt $i of 3"
            npm run build:mac && exit 0
            echo "Attempt $i failed. Retrying in 20s..."
            sleep 20
          done
          echo "Desktop build failed after 3 attempts"
          exit 1

      - name: Upload Mac Installer Artifact
        uses: actions/upload-artifact@v4
        with:
          name: watchanimez-mac-installer
          path: |
            desktop-app/dist/*.dmg
            desktop-app/dist/*.zip

  build-desktop-linux:
    name: Build Desktop App (Linux)
    needs: detect-changes
    if: needs.detect-changes.outputs.desktop == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y rpm libarchive-tools

      - name: Install Dependencies
        run: npm ci

      - name: Cache Electron downloads
        uses: actions/cache@v4
        with:
          path: |
            ${{ runner.temp }}/electron-cache
            ${{ runner.temp }}/electron-builder-cache
          key: electron-linux-${{ hashFiles('desktop-app/package.json') }}
          restore-keys: |
            electron-linux-

      - name: Build Desktop App
        working-directory: desktop-app
        env:
          ELECTRON_CACHE: ${{ runner.temp }}/electron-cache
          ELECTRON_BUILDER_CACHE: ${{ runner.temp }}/electron-builder-cache
        run: |
          for i in 1 2 3; do
            echo "Desktop build attempt $i of 3"
            npm run build:linux && exit 0
            echo "Attempt $i failed. Retrying in 20s..."
            sleep 20
          done
          echo "Desktop build failed after 3 attempts"
          exit 1

      - name: Upload Linux Installer Artifact
        uses: actions/upload-artifact@v4
        with:
          name: watchanimez-linux-installer
          path: |
            desktop-app/dist/*.AppImage
            desktop-app/dist/*.deb

  build-android:
    name: Build Android App (APK)
    needs: detect-changes
    if: needs.detect-changes.outputs.android-capacitor == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Setup Java JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Sync Capacitor
        working-directory: android-app
        run: npx cap sync android

      - name: Build Debug APK
        working-directory: android-app/android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload Android APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: watchanimez-android-apk
          path: android-app/android/app/build/outputs/apk/debug/app-debug.apk

  build-flutter-android:
    name: Build Flutter Android App (APK)
    needs: detect-changes
    if: needs.detect-changes.outputs.flutter == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: false

      - name: Install Dependencies
        working-directory: flutter
        run: flutter pub get

      - name: Bump Version
        working-directory: flutter
        run: |
          # Date-based versioning: YYYY.M.D+run_number
          # Matches the release tag format so the app can compare versions.
          DATE=$(date -u '+%Y.%-m.%-d')
          NEW_VERSION="${DATE}+${{ github.run_number }}"
          sed -i "s/^version:.*/version: ${NEW_VERSION}/" pubspec.yaml
          echo "App version: ${NEW_VERSION}"
          echo "app_version=${NEW_VERSION}" >> $GITHUB_ENV

      - name: Run Flutter Analyzer
        working-directory: flutter
        run: flutter analyze
        continue-on-error: true

      - name: Build Flutter Mobile APK
        working-directory: flutter
        run: flutter build apk --debug --android-skip-build-dependency-validation

      - name: Upload Flutter APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: watchanimez-flutter-android-apk
          path: flutter/build/app/outputs/flutter-apk/app-debug.apk

  release-desktop:
    name: Release Desktop (Electron)
    needs: [build-desktop, build-desktop-mac, build-desktop-linux]
    runs-on: ubuntu-latest
    if: always() &&
        github.event_name == 'push' &&
        (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')) &&
        needs.build-desktop.result != 'skipped'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with: { name: watchanimez-windows-installer, path: desktop-build }
      - uses: actions/download-artifact@v4
        with: { name: watchanimez-mac-installer, path: mac-build }
      - uses: actions/download-artifact@v4
        with: { name: watchanimez-linux-installer, path: linux-build }

      - name: Prepare Desktop Release Files
        run: |
          mkdir release-assets
          cp desktop-build/*.exe release-assets/ || true
          cp mac-build/*.dmg release-assets/ || true
          cp mac-build/*.zip release-assets/ || true
          cp linux-build/*.AppImage release-assets/ || true
          cp linux-build/*.deb release-assets/ || true

      - name: Generate Version Tag
        id: tag
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "tag=${{ github.ref_name }}-desktop" >> $GITHUB_OUTPUT
            echo "name=WatchAnimez ${{ github.ref_name }} Desktop" >> $GITHUB_OUTPUT
          else
            SHA=$(echo "${{ github.sha }}" | cut -c1-7)
            DATE=$(date -u '+%Y.%m.%d')
            echo "tag=desktop-v${DATE}-${SHA}" >> $GITHUB_OUTPUT
            echo "name=WatchAnimez Desktop ${DATE} (${SHA})" >> $GITHUB_OUTPUT
          fi

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.name }}
          body: |
            Desktop builds (Windows, macOS, Linux) — Electron app.
            Built from commit ${{ github.sha }}.
          draft: false
          prerelease: false
          files: release-assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release-flutter-android:
    name: Release Flutter Android (Mobile + TV)
    needs: [build-flutter-android]
    runs-on: ubuntu-latest
    if: always() &&
        github.event_name == 'push' &&
        (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')) &&
        needs.build-flutter-android.result == 'success'
    steps:
      - uses: actions/checkout@v4

      - name: Read App Version
        id: ver
        working-directory: flutter
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: //')
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "App version from pubspec: ${VERSION}"

      - uses: actions/download-artifact@v4
        with: { name: watchanimez-flutter-android-apk, path: flutter-android-build }

      - name: Prepare Flutter Release Files
        run: |
          mkdir release-assets
          cp flutter-android-build/*.apk release-assets/WatchAnimez-Android-2.apk || true

      - name: Generate Version Tag
        id: tag
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "tag=${{ github.ref_name }}-android" >> $GITHUB_OUTPUT
            echo "name=WatchAnimez ${{ github.ref_name }} Android" >> $GITHUB_OUTPUT
          else
            echo "tag=android-v${{ steps.ver.outputs.version }}" >> $GITHUB_OUTPUT
            echo "name=WatchAnimez v${{ steps.ver.outputs.version }} Android" >> $GITHUB_OUTPUT
          fi

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.name }}
          body: |
            Flutter Android app (works on both mobile and Android TV).
            Version: v${{ steps.ver.outputs.version }}
            Built from commit ${{ github.sha }}.
          draft: false
          prerelease: false
          files: release-assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}


